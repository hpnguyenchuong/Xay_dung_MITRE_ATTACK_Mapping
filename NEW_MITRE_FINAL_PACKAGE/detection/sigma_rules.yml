title: DroneFlood Malware Detection
status: experimental
description: Detects DroneFlood C2 beaconing and mutex creation
author: SOC Analyst
date: 2026-06-30
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\drone_client.exe'
    CommandLine|contains:
      - '5555'
      - 'c2.dronefleet.net'
  condition: selection

---
title: DroneFlood Mutex Creation
status: experimental
description: Detects creation of DroneFlood mutex
author: SOC Analyst
date: 2026-06-30
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    EventID: 1
    ProcessName|contains: 'drone_client.exe'
  condition: selection

---
title: DroneFlood Network Connection (Sysmon)
status: experimental
description: Detects network connection to DroneFlood C2
author: SOC Analyst
date: 2026-06-30
logsource:
  category: network_connection
  product: windows
detection:
  selection:
    EventID: 3
    DestinationPort: 5555
    Image|endswith: '\drone_client.exe'
  condition: selection