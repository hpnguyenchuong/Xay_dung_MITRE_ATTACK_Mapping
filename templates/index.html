<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Fleet Malware Mapping</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0b1326',
                        panel: '#151e32',
                        accent: '#89ceff',
                        danger: '#f43f5e',
                        warning: '#fbbf24',
                        success: '#34d399',
                        info: '#a855f7'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #0b1326;
            color: #e2e8f0;
            overflow: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .panel {
            background-color: rgba(21, 30, 50, 0.8);
            border: 1px solid #1e293b;
            border-radius: 6px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(8px);
        }
        
        .panel-header {
            background: linear-gradient(to right, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.4));
            border-bottom: 1px solid #1e293b;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #89ceff;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .bento-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: calc(100vh - 280px); /* Adjust based on top and bottom spacing */
        }
        
        .bento-row {
            display: flex;
            gap: 12px;
        }
        
        .bento-row-1 { flex: 0.8; min-height: 0; }
        .bento-row-2 { flex: 1.5; min-height: 0; }
        .bento-row-3 { flex: 1.2; min-height: 0; }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 2px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(51, 65, 85, 0.8);
            border-radius: 2px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(71, 85, 105, 1);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        .animate-pulse-slow {
            animation: pulse-red 2s infinite;
        }
        
        .flow-line {
            width: 2px;
            background: linear-gradient(to bottom, #334155, #f43f5e);
            margin: 4px auto;
            flex-grow: 1;
        }
    </style>
</head>
<body class="h-screen w-screen p-3 font-sans">
    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:red; z-index:9999; padding:20px; font-family:monospace; overflow-y:auto;">
        <h2>DASHBOARD RENDER ERROR</h2>
        <pre id="error-message"></pre>
    </div>
    <script>
        window.addEventListener('error', function(e) {
            document.getElementById('error-overlay').style.display = 'block';
            document.getElementById('error-message').innerText = e.message + '\n' + e.filename + ':' + e.lineno;
        });
        window.addEventListener('unhandledrejection', function(e) {
            document.getElementById('error-overlay').style.display = 'block';
            document.getElementById('error-message').innerText = e.reason;
        });
    </script>
    <div id="root" class="h-full w-full"></div>
    <script type="text/babel">
        /* INCLUDE: Sidebar.html */
        /* INCLUDE: ResearchMethodologyPanel.html */
        /* INCLUDE: ArtifactDrawer.html */
        /* INCLUDE: C2MonitorPanel.html */
        /* INCLUDE: App.html */
        /* INCLUDE: EvidenceChainPanel.html */
        /* INCLUDE: GroundTruthPanel.html */
        /* INCLUDE: CampaignSummaryCard.html */
        /* INCLUDE: ICSImpactMatrixPanel.html */
        /* INCLUDE: MappingTrendPanel.html */
        /* INCLUDE: ResearchQuestionsPanel.html */
        /* INCLUDE: AcademicConclusionPanel.html */
        /* INCLUDE: MappingValidationPanel.html */
        /* INCLUDE: TranslationEnginePanel.html */
        /* INCLUDE: FleetInfectionPanel.html */
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
