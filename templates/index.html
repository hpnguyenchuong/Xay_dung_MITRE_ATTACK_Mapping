    <style>
:root {
  --bg-main: #050b14;
  --panel-bg: rgba(15, 23, 42, 0.58);
  --panel-border: rgba(148, 163, 184, 0.18);
  --cyan: #38bdf8;
  --purple: #a78bfa;
  --red: #f43f5e;
  --green: #34d399;
  --yellow: #facc15;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

body {
  color: #e5e7eb;
  background: #0B1020;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.bento-grid {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  scroll-behavior: smooth;
  padding: 6px 10px;
  gap: 8px;
}

.bento-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}

.panel,
.card,
.glass-card {
  background: rgba(15, 23, 42, 0.65);
  border: 1px solid rgba(148, 163, 184, 0.25);
  border-radius: 12px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  height: 100%;
  width: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel:hover,
.card:hover,
.glass-card:hover {
  transform: translateY(-2px);
  border-color: rgba(56,189,248,0.45);
  box-shadow:
    0 22px 60px rgba(0,0,0,0.42),
    0 0 22px rgba(56,189,248,0.12);
}

.panel-header {
  background: linear-gradient(to right, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.4));
  border-bottom: 1px solid var(--panel-border);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-title,
.card-title,
.panel-header h2, 
.panel-header h3 {
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #f8fafc;
  font-size: 15px;
  font-weight: 700;
  text-shadow: 0 0 18px rgba(56,189,248,0.25);
  margin: 0;
}

.metric-value,
.big-number,
.score-value {
  font-weight: 900;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  color: transparent;
}

.status-active,
.badge-success {
  color: var(--green);
  animation: pulseGlowGreen 1.8s infinite;
}

.status-critical,
.badge-critical {
  color: var(--red);
  animation: pulseGlowRed 1.4s infinite;
}

@keyframes pulseGlowGreen {
  0%, 100% { text-shadow: 0 0 6px rgba(52,211,153,0.35); }
  50% { text-shadow: 0 0 18px rgba(52,211,153,0.85); }
}

@keyframes pulseGlowRed {
  0%, 100% { text-shadow: 0 0 6px rgba(244,63,94,0.35); }
  50% { text-shadow: 0 0 18px rgba(244,63,94,0.9); }
}

@keyframes pulse-red {
  0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); }
  100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
}

.animate-pulse-slow {
  animation: pulse-red 2s infinite;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  color: #93c5fd;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid rgba(148,163,184,0.2);
  padding: 6px;
  text-align: left;
}

tbody tr {
  border-bottom: 1px solid rgba(148,163,184,0.08);
  transition: background 0.2s ease;
}

tbody td {
  padding: 6px;
  font-size: 14px;
}

tbody tr:hover {
  background: rgba(30,41,59,0.55);
}

::-webkit-scrollbar,
.custom-scrollbar::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track,
.custom-scrollbar::-webkit-scrollbar-track {
  background: rgba(15, 23, 42, 0.5);
  border-radius: 8px;
}

::-webkit-scrollbar-thumb,
.custom-scrollbar::-webkit-scrollbar-thumb {
  background: rgba(148,163,184,0.4);
  border-radius: 8px;
}

::-webkit-scrollbar-thumb:hover,
.custom-scrollbar::-webkit-scrollbar-thumb:hover {
  background: rgba(56,189,248,0.7);
}

.metric-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 6px;
}

.metric-card {
  padding: 8px;
  border-radius: 10px;
  background: rgba(15,23,42,0.62);
  border: 1px solid rgba(148,163,184,0.14);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.metric-label {
  font-size: 15px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-align: center;
}

.metric-value {
  font-size: 42px;
  line-height: 1;
  text-align: center;
}

.heatmap-cell {
  border-radius: 10px;
  padding: 4px 10px;
  display: inline-block;
  text-align: center;
  font-weight: 700;
  border: 1px solid rgba(255,255,255,0.08);
}

.heat-low {
  background: rgba(15,23,42,0.75);
  color: #94a3b8;
}

.heat-medium {
  background: rgba(56,189,248,0.16);
  color: #38bdf8;
}

.heat-high {
  background: rgba(244,63,94,0.18);
  color: #fb7185;
  box-shadow: 0 0 16px rgba(244,63,94,0.18);
}

.key-finding-box {
  padding: 18px;
  border-radius: 18px;
  background:
    linear-gradient(rgba(15,23,42,0.86), rgba(15,23,42,0.86)) padding-box,
    linear-gradient(135deg, #38bdf8, #a78bfa, #f43f5e) border-box;
  border: 1px solid transparent;
  box-shadow: 0 0 28px rgba(56,189,248,0.12);
}

.key-finding-title {
  color: #f8fafc;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.key-finding-text {
  color: #cbd5e1;
  line-height: 1.6;
}

.flow-line {
  width: 2px;
  background: linear-gradient(to bottom, #334155, #f43f5e);
  margin: 4px auto;
  flex-grow: 1;
}
    </style>
</head>
